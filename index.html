<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropics & Hurricane Center</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Tropics & Hurricane Center</h1>
    </header>

    <section id="outlook">
        <h2>🌀 Latest Tropical Outlook</h2>
        <div class="outlook-container">
            <iframe src="https://www.nhc.noaa.gov/text/refresh/MIATWOAT+shtml/MIATWOAT.shtml" 
                    width="100%" height="250" style="border:none;"></iframe>
            <div class="outlook-images">
                <img src="https://www.nhc.noaa.gov/xgtwo/two_atl_2d0.png" alt="2-Day Outlook" class="nhc-graphic">
                <img src="https://www.nhc.noaa.gov/xgtwo/two_atl_5d0.png" alt="5-Day Outlook" class="nhc-graphic">
            </div>
        </div>
    </section>

    <section id="active-storms">
        <h2>🌪️ Active Storms</h2>
        <div id="storm-list">Loading storm information...</div>
    </section>

    <section id="satellite">
        <h2>🌎 Satellite View</h2>
        <img src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/gm/GEOCOLOR/GOES16-GM-GEOCOLOR-900x540.gif" 
             alt="GOES-East Gulf View" class="nhc-graphic cropped">
    </section>

    <section id="clayupdate">
        <h2>🎥 ClayUpdate!</h2>
        <!-- Replace with your latest update embed -->
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/?rel=0" 
                title="ClayUpdate!" frameborder="0" allowfullscreen></iframe>
    </section>

    <footer>
        <p>Page auto-updates using data from NOAA & NHC | Designed by Clayton's Weather</p>
    </footer>
</body>
</html>
